services:
  backend:
    build: ./backend
    container_name: crm-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: crm-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
